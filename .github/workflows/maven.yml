name: CI - N11 Test Automation

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  schedule:
    - cron: '0 0 * * *'

jobs:
  test:
    name: Run Selenium + Cucumber Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Firefox
        run: |
          sudo apt-get install -y firefox

      - name: Build project
        run: mvn clean compile -q

      - name: Execute TestNG test suite (headless)
        run: mvn test -Dheadless=true

      - name: Upload test results as artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cucumber-test-reports
          path: target/cucumber-reports/
          retention-days: 14

      - name: Upload failure screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: failure-screenshots
          path: target/screenshots/
          retention-days: 14

      - name: Check test pass rate (minimum 80%)
        if: always()
        run: |
          if [ ! -f target/cucumber-reports/cucumber.json ]; then
            echo "❌ ERROR: No test report found (cucumber.json missing)."
            exit 1
          fi

          echo "Parsing test results from cucumber.json..."

          # Parse pass/fail counts from cucumber.json using Python
          python3 -c "
          import json, sys
          with open('target/cucumber-reports/cucumber.json') as f:
              data = json.load(f)

          total = 0
          passed = 0
          failed = 0

          for feature in data:
              for scenario in feature.get('elements', []):
                  if scenario.get('type') == 'scenario':
                      total += 1
                      steps = scenario.get('steps', [])
                      scenario_passed = all(
                          s.get('result', {}).get('status') == 'passed'
                          for s in steps
                          if s.get('result')
                      )
                      if scenario_passed:
                          passed += 1
                      else:
                          failed += 1

          if total == 0:
              print('⚠️  No test scenarios found.')
              sys.exit(1)

          rate = (passed / total) * 100
          print(f'📊 Test Results: {passed}/{total} passed ({rate:.1f}%)')
          print(f'   ✅ Passed: {passed}')
          print(f'   ❌ Failed: {failed}')

          if rate < 80:
              print(f'🚫 QUALITY GATE FAILED: Pass rate {rate:.1f}% is below 80% threshold.')
              sys.exit(1)
          else:
              print(f'✅ QUALITY GATE PASSED: Pass rate {rate:.1f}% meets 80% threshold.')
          "

